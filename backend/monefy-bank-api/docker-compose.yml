services:
  postgres:
    image: postgres:16
    container_name: monefy-bank-postgres
    environment:
      POSTGRES_DB: fastbite0_SampleDB
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - monefy_bank_pgdata:/var/lib/postgresql/data

volumes:
  monefy_bank_pgdata:
